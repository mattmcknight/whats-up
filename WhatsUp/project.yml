name: WhatsUp
options:
  bundleIdPrefix: com.mmcknight
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  WhatsUp:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/AppIcon.icns
        buildPhase: resources
        type: file
    resources:
      - path: Resources/Info.plist
        buildPhase: none
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/WhatsUp.entitlements
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.mmcknight.whatsup
        PRODUCT_NAME: WhatsUp
        GENERATE_INFOPLIST_FILE: false
